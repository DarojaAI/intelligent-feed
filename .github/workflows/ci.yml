name: ci

on:
  pull_request:
  push:
    branches: [main]

# The reusable-pre-commit workflow needs pull-requests: write to post
# its result comment. The default GITHUB_TOKEN only grants
# pull-requests: none, which makes the workflow call fail at startup
# with: "requesting 'pull-requests: write', but is only allowed
# 'pull-requests: none'". Grant it explicitly at the workflow level.
# Same fix used in DarojaAI/devnexus-common/.github/workflows/ci.yml.
permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 is the existing supported version (kept for backward
        # compatibility while downstream consumers migrate). 3.14 is
        # the new `requires-python` floor declared in pyproject.toml
        # and is the version the orchestrator will use going forward.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
        # setuptools_scm derives the package version from git tags,
        # so the test job needs full history (default is shallow).
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Run pre-commit
        uses: DarojaAI/infra-actions/.github/workflows/reusable-pre-commit.yml@v1.3.0
        with:
          python-version: "3.11"
        env:
          # Pre-commit on this repo runs against the current
          # branch only; no cross-repo token rewriting is required.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
